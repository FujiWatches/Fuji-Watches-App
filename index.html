<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Fuji Watches - Controle de Estoque</title>
<meta name="description" content="Controle de estoque de relógios da Fuji Watches" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#12141b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fuji Watches" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141b;
    --surface:#1c202b;
    --surface-2:#242938;
    --border:#333a4a;
    --gold:#c9a15f;
    --gold-bright:#e3c383;
    --text:#f1ece1;
    --muted:#8d94a8;
    --ok:#6fae83;
    --ok-bg:rgba(111,174,131,0.14);
    --sold:#c17d72;
    --sold-bg:rgba(193,125,114,0.14);
    --res:#cf9f52;
    --res-bg:rgba(207,159,82,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  #root{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:86px;}

  .brand{display:flex;align-items:center;gap:12px;padding:calc(20px + env(safe-area-inset-top)) 20px 12px;}
  .dial-mark{width:34px;height:34px;flex:none;}
  .brand img{flex:none;}
  .brand h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;letter-spacing:0.02em;margin:0;color:var(--gold-bright);}
  .brand span{display:block;font-size:10.5px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-top:1px;}

  /* ---- Lock screen ---- */
  .lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:92vh;padding:32px;text-align:center;}
  .lock-wrap .dial-mark{width:64px;height:64px;margin-bottom:18px;}
  .lock-wrap h2{font-family:'Cormorant Garamond',serif;font-size:26px;margin:0 0 6px;color:var(--gold-bright);}
  .lock-wrap p{color:var(--muted);font-size:13.5px;margin:0 0 26px;line-height:1.5;}
  .pin-input{width:100%;max-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:22px;letter-spacing:10px;text-align:center;color:var(--text);font-family:'Inter',sans-serif;}
  .pin-input:focus{outline:none;border-color:var(--gold);}
  .btn{border:none;border-radius:12px;padding:14px 22px;font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer;transition:transform .12s ease, opacity .12s ease;}
  .btn:active{transform:scale(0.97);}
  .btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#241b0c;}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn-block{width:100%;max-width:220px;margin-top:16px;}
  .lock-error{color:var(--sold);font-size:12.5px;margin-top:10px;min-height:16px;}

  /* ---- Tabs ---- */
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(28,32,43,0.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;max-width:480px;margin:0 auto;padding:8px 12px calc(8px + env(safe-area-inset-bottom));z-index:40;}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:6px;cursor:pointer;}
  .tab-btn.active{color:var(--gold-bright);}
  .tab-btn svg{width:20px;height:20px;}

  /* ---- Dashboard ---- */
  .section{padding:6px 18px 4px;}
  .ring-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 18px;display:flex;align-items:center;gap:20px;margin:8px 0 18px;}
  .ring-stats{flex:1;}
  .ring-stats .big{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--gold-bright);line-height:1;}
  .ring-stats .lbl{color:var(--muted);font-size:12px;margin-top:4px;}
  .legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 14px;}
  .stat-box .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .stat-box .val{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;}
  .stat-box.pos .val{color:var(--ok);}
  .stat-box.neu .val{color:var(--text);}

  .section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--gold-bright);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
  .owner-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:13.5px;}
  .owner-row b{color:var(--gold-bright);font-weight:600;}

  /* ---- List / search ---- */
  .search-bar{display:flex;gap:8px;padding:6px 18px 10px;}
  .search-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:13.5px;font-family:'Inter',sans-serif;}
  .search-bar input:focus{outline:none;border-color:var(--gold);}
  .chip-row{display:flex;gap:8px;padding:0 18px 12px;overflow-x:auto;}
  .chip{flex:none;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--gold);color:#241b0c;border-color:var(--gold);}

  .card-list{padding:0 18px;display:flex;flex-direction:column;gap:10px;}
  .watch-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;cursor:pointer;}
  .wc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .wc-model{font-weight:600;font-size:14.5px;}
  .wc-sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .badge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em;}
  .badge.Disponível{background:var(--ok-bg);color:var(--ok);}
  .badge.Vendido{background:var(--sold-bg);color:var(--sold);}
  .badge.Reservado{background:var(--res-bg);color:var(--res);}
  .wc-bottom{display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px;color:var(--muted);}
  .wc-bottom b{color:var(--text);font-weight:600;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:50px 20px;}

  .fab{position:fixed;bottom:96px;right:calc(50% - 240px + 20px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold-bright),var(--gold));border:none;color:#241b0c;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.4);z-index:30;}
  @media (max-width:520px){.fab{right:20px;}}

  /* ---- Modal ---- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(8,9,13,0.72);z-index:50;display:flex;align-items:flex-end;}
  .modal{background:var(--surface);width:100%;max-width:480px;margin:0 auto;border-radius:22px 22px 0 0;max-height:90vh;overflow-y:auto;padding:20px 20px calc(28px + env(safe-area-inset-bottom));}
  .modal h3{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-bright);margin:0 0 16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .field input, .field select{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:13.5px;font-family:'Inter',sans-serif;}
  .field input[type="date"]{-webkit-appearance:none;appearance:none;height:41px;line-height:1.2;}
  .field input[type="date"]::-webkit-date-and-time-value{text-align:left;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--gold);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;min-width:0;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}
  .danger-link{display:block;text-align:center;color:var(--sold);font-size:12.5px;margin-top:16px;cursor:pointer;background:none;border:none;width:100%;padding:8px;}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;z-index:60;box-shadow:0 6px 18px rgba(0,0,0,.4);}
  .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--muted);font-size:13px;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>

function cid(){ return 'w_' + Math.random().toString(36).slice(2,10); }
function fmtBRL(n){
  if(n===""||n===null||n===undefined||isNaN(n)) return "—";
  return Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtDate(d){
  if(!d) return "—";
  const [y,m,day]=d.split('-');
  return `${day}/${m}/${y}`;
}

const state = {
  unlocked:false,
  pin:null,
  items:null,
  tab:'dashboard',
  search:'',
  filterOwner:'Todos',
  filterStatus:'Todos',
  modalOpen:false,
  editingItem:null,
  loading:true,
  errorMsg:'',
  lastSync:null,
  syncing:false
};

const root = document.getElementById('root');
let unsubscribeItems = null;

async function loadPin(){
  try{
    const snap = await window.__fbGetDoc(window.__fbDoc(window.__fbDb,'fujiwatches','pin'));
    state.pin = snap.exists() ? snap.data().value : null;
  }catch(e){ console.error('loadPin error', e); state.pin = null; }
}
async function savePin(pin){
  await window.__fbSetDoc(window.__fbDoc(window.__fbDb,'fujiwatches','pin'), {value: pin});
  state.pin = pin;
}
async function loadItems(){
  try{
    const snap = await window.__fbGetDoc(window.__fbDoc(window.__fbDb,'fujiwatches','items'));
    state.items = snap.exists() ? JSON.parse(snap.data().payload) : null;
    state.lastSync = new Date();
  }catch(e){ console.error('loadItems error', e); state.items = null; }
  if(!state.items){
    state.items = STARTER_ITEMS;
    await saveItems();
  }
  startRealtimeSync();
}
async function saveItems(){
  try{
    await window.__fbSetDoc(window.__fbDoc(window.__fbDb,'fujiwatches','items'), {payload: JSON.stringify(state.items)});
    state.lastSync = new Date();
  }catch(e){ console.error('saveItems error', e); showToast('Erro ao salvar. Verifique sua internet.'); }
}

function startRealtimeSync(){
  if(unsubscribeItems) return; // already listening
  unsubscribeItems = window.__fbOnSnapshot(window.__fbDoc(window.__fbDb,'fujiwatches','items'), (snap)=>{
    if(!snap.exists()) return;
    const incoming = JSON.parse(snap.data().payload);
    // avoid re-render loop if data is identical
    if(JSON.stringify(incoming) === JSON.stringify(state.items)) return;
    state.items = incoming;
    state.lastSync = new Date();
    if(state.unlocked && !state.modalOpen) render();
  }, (err)=>{ console.error('realtime sync error', err); });
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

async function init(){
  await loadPin();
  state.unlocked = false; // always goes through lock/setup screen
  state.loading = false;
  render();
}

/* ---------------- RENDER ---------------- */
function render(){
  root.innerHTML = '';
  if(state.loading){
    root.innerHTML = `<div class="loading">Carregando...</div>`;
    return;
  }
  if(!state.pin){
    renderSetupPin();
    return;
  }
  if(!state.unlocked){
    renderLock();
    return;
  }
  if(state.items===null){
    root.innerHTML = `<div class="loading">Carregando estoque...</div>`;
    loadItems().then(render);
    return;
  }
  renderApp();
}

function renderSetupPin(){
  const wrap = document.createElement('div');
  wrap.className='lock-wrap';
  wrap.innerHTML = `
    <img src="${LOGO_FULL}" alt="Fuji Watches" style="width:180px;height:auto;margin-bottom:14px;" />
    <h2>Criar senha de acesso</h2>
    <p>Defina uma senha simples (4 a 6 dígitos) para você e seu sócio acessarem o controle de estoque.</p>
    <input class="pin-input" id="pinNew" type="tel" inputmode="numeric" maxlength="6" placeholder="••••" />
    <button class="btn btn-gold btn-block" id="pinSetBtn">Criar senha</button>
    <div class="lock-error" id="pinErr"></div>
  `;
  root.appendChild(wrap);
  document.getElementById('pinSetBtn').onclick = async ()=>{
    const val = document.getElementById('pinNew').value.trim();
    if(val.length<4){ document.getElementById('pinErr').textContent='Use pelo menos 4 dígitos.'; return; }
    const btn = document.getElementById('pinSetBtn');
    btn.disabled = true; btn.textContent = 'Salvando...';
    try{
      if(!window.__fbDb) throw new Error('no-firebase');
      await savePin(val);
      state.unlocked = true;
      render();
    }catch(e){
      btn.disabled = false; btn.textContent = 'Criar senha';
      document.getElementById('pinErr').textContent = 'Não consegui salvar. Verifique sua conexão com a internet e tente novamente.';
    }
  };
}

function renderLock(){
  const wrap = document.createElement('div');
  wrap.className='lock-wrap';
  wrap.innerHTML = `
    <img src="${LOGO_FULL}" alt="Fuji Watches" style="width:180px;height:auto;margin-bottom:14px;" />
    <h2>Controle de Estoque</h2>
    <p>Digite a senha combinada com seu sócio para entrar.</p>
    <input class="pin-input" id="pinTry" type="tel" inputmode="numeric" maxlength="6" placeholder="••••" />
    <button class="btn btn-gold btn-block" id="pinGoBtn">Entrar</button>
    <div class="lock-error" id="pinErr2"></div>
  `;
  root.appendChild(wrap);
  const tryEnter = ()=>{
    const val = document.getElementById('pinTry').value.trim();
    if(val === state.pin){ state.unlocked = true; render(); }
    else document.getElementById('pinErr2').textContent = 'Senha incorreta.';
  };
  document.getElementById('pinGoBtn').onclick = tryEnter;
  document.getElementById('pinTry').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });
}

function renderApp(){
  const wrap = document.createElement('div');

  const brand = document.createElement('div');
  brand.className='brand';
  const syncLabel = state.lastSync
    ? `Sincronizado às ${state.lastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`
    : '';
  brand.innerHTML = `
    <img src="${LOGO_ICON}" alt="Fuji Watches" style="height:38px;width:auto;" />
    <div style="flex:1;"><h1>Fuji Watches</h1><span style="display:block;font-size:10px;color:var(--muted);margin-top:2px;">${syncLabel}</span></div>
    <button id="syncBtn" title="Atualizar dados" style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold-bright);">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${state.syncing?'animation:spin 0.8s linear infinite;':''}"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
  `;
  wrap.appendChild(brand);

  const content = document.createElement('div');
  if(state.tab==='dashboard') renderDashboard(content);
  else if(state.tab==='list') renderList(content);
  else renderMonthly(content);
  wrap.appendChild(content);

  // FAB only on list tab
  if(state.tab==='list'){
    const fab = document.createElement('button');
    fab.className='fab';
    fab.textContent='+';
    fab.onclick = ()=>openModal(null);
    wrap.appendChild(fab);
  }

  const tabbar = document.createElement('div');
  tabbar.className='tabbar';
  tabbar.innerHTML = `
    <button class="tab-btn ${state.tab==='dashboard'?'active':''}" id="tabDash">${ICON_DASH}Painel</button>
    <button class="tab-btn ${state.tab==='list'?'active':''}" id="tabList">${ICON_LIST}Estoque</button>
    <button class="tab-btn ${state.tab==='monthly'?'active':''}" id="tabMonthly">${ICON_MONTHLY}Mensal</button>
  `;
  wrap.appendChild(tabbar);

  root.appendChild(wrap);
  document.getElementById('tabDash').onclick=()=>{state.tab='dashboard';render();};
  document.getElementById('tabList').onclick=()=>{state.tab='list';render();};
  document.getElementById('tabMonthly').onclick=()=>{state.tab='monthly';render();};
  document.getElementById('syncBtn').onclick = async ()=>{
    if(state.syncing) return;
    state.syncing = true;
    render();
    await loadItems();
    state.syncing = false;
    render();
    showToast('Dados atualizados.');
  };

  if(state.modalOpen) renderModal();
}

function computeStats(){
  const items = state.items;
  const total = items.length;
  const available = items.filter(i=>i.status==='Disponível').length;
  const sold = items.filter(i=>i.status==='Vendido').length;
  const reserved = items.filter(i=>i.status==='Reservado').length;
  const num = v => (v==="" || v===null || v===undefined || isNaN(v)) ? 0 : Number(v);
  const invested = items.reduce((s,i)=>s+num(i.purchasePrice),0);
  const predictedRevenue = items.reduce((s,i)=>s+num(i.expectedSale),0);
  const predictedMargin = items.reduce((s,i)=>{
    if(i.purchasePrice!=="" && i.expectedSale!=="") return s + (num(i.expectedSale)-num(i.purchasePrice));
    return s;
  },0);
  const realizedProfit = items.reduce((s,i)=>{
    if(i.status==='Vendido' && i.realSale!=="") return s + (num(i.realSale)-num(i.purchasePrice));
    return s;
  },0);
  return {total,available,sold,reserved,invested,predictedRevenue,predictedMargin,realizedProfit};
}

function renderDashboard(container){
  const s = computeStats();
  const pctSold = s.total ? Math.round((s.sold/s.total)*100) : 0;
  const R = 46, C = 2*Math.PI*R;
  const dashSold = (pctSold/100)*C;

  const section = document.createElement('div');
  section.className='section';
  section.innerHTML = `
    <div class="ring-card">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${R}" fill="none" stroke="#333a4a" stroke-width="8"/>
        <circle cx="50" cy="50" r="${R}" fill="none" stroke="#c17d72" stroke-width="8"
          stroke-dasharray="${dashSold} ${C-dashSold}" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
        <text x="50" y="47" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="22" fill="#f1ece1" font-weight="700">${pctSold}%</text>
        <text x="50" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#8d94a8">VENDIDOS</text>
      </svg>
      <div class="ring-stats">
        <div class="big">${s.total}</div>
        <div class="lbl">relógios no estoque</div>
        <div class="legend">
          <div class="legend-item"><span class="dot" style="background:#6fae83"></span>Disponível: ${s.available}</div>
          <div class="legend-item"><span class="dot" style="background:#c17d72"></span>Vendido: ${s.sold}</div>
          <div class="legend-item"><span class="dot" style="background:#cf9f52"></span>Reservado: ${s.reserved}</div>
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box neu"><div class="lbl">Total Investido</div><div class="val">${fmtBRL(s.invested)}</div></div>
      <div class="stat-box neu"><div class="lbl">Previsto em Vendas</div><div class="val">${fmtBRL(s.predictedRevenue)}</div></div>
      <div class="stat-box pos"><div class="lbl">Margem Prevista</div><div class="val">${fmtBRL(s.predictedMargin)}</div></div>
      <div class="stat-box pos"><div class="lbl">Lucro Realizado</div><div class="val">${fmtBRL(s.realizedProfit)}</div></div>
    </div>

    <div class="section-title">Por consignante</div>
  `;
  container.appendChild(section);

  const ownerBlock = document.createElement('div');
  ownerBlock.style.padding = '0 18px 10px';
  const owners = {};
  state.items.forEach(i=>{ owners[i.owner] = (owners[i.owner]||0)+1; });
  Object.entries(owners).forEach(([owner,count])=>{
    const row = document.createElement('div');
    row.className='owner-row';
    row.innerHTML = `<span>${owner}</span><b>${count} relógio${count>1?'s':''}</b>`;
    ownerBlock.appendChild(row);
  });
  container.appendChild(ownerBlock);
}

function renderList(container){
  const section = document.createElement('div');
  section.style.paddingTop='4px';

  const searchBar = document.createElement('div');
  searchBar.className='search-bar';
  searchBar.innerHTML = `<input id="searchInput" placeholder="Buscar por modelo, cor..." value="${state.search}" />`;
  section.appendChild(searchBar);

  const owners = ['Todos', ...new Set(state.items.map(i=>i.owner))];
  const ownerChips = document.createElement('div');
  ownerChips.className='chip-row';
  owners.forEach(o=>{
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.filterOwner===o?' active':'');
    chip.textContent = o;
    chip.onclick = ()=>{ state.filterOwner=o; render(); };
    ownerChips.appendChild(chip);
  });
  section.appendChild(ownerChips);

  const statuses = ['Todos','Disponível','Reservado','Vendido'];
  const statusChips = document.createElement('div');
  statusChips.className='chip-row';
  statusChips.style.paddingTop='0';
  statuses.forEach(st=>{
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.filterStatus===st?' active':'');
    chip.textContent = st;
    chip.onclick = ()=>{ state.filterStatus=st; render(); };
    statusChips.appendChild(chip);
  });
  section.appendChild(statusChips);

  const list = document.createElement('div');
  list.className='card-list';
  list.style.marginTop='6px';
  list.style.marginBottom='20px';

  let filtered = state.items.filter(i=>{
    const matchSearch = (i.model+' '+i.color).toLowerCase().includes(state.search.toLowerCase());
    const matchOwner = state.filterOwner==='Todos' || i.owner===state.filterOwner;
    const matchStatus = state.filterStatus==='Todos' || i.status===state.filterStatus;
    return matchSearch && matchOwner && matchStatus;
  });

  if(filtered.length===0){
    list.innerHTML = `<div class="empty">Nenhum relógio encontrado com esses filtros.</div>`;
  } else {
    filtered.forEach(item=>{
      const card = document.createElement('div');
      card.className='watch-card';
      card.innerHTML = `
        <div class="wc-top">
          <div>
            <div class="wc-model">${item.model}</div>
            <div class="wc-sub">${item.color?item.color+' · ':''}${item.owner}</div>
          </div>
          <span class="badge ${item.status}">${item.status}</span>
        </div>
        <div class="wc-bottom">
          <span>Pago: <b>${fmtBRL(item.purchasePrice)}</b></span>
          <span>Previsto: <b>${fmtBRL(item.expectedSale)}</b></span>
        </div>
      `;
      card.onclick = ()=>openModal(item);
      list.appendChild(card);
    });
  }
  section.appendChild(list);
  container.appendChild(section);

  const searchInputEl = section.querySelector('#searchInput');
  if(searchInputEl){
    searchInputEl.addEventListener('input', e=>{
      state.search = e.target.value;
      const cursorPos = e.target.selectionStart;
      render();
      const input = document.getElementById('searchInput');
      if(input){
        input.focus();
        input.setSelectionRange(cursorPos,cursorPos);
      }
    });
  }
}

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function monthLabel(key){
  if(key==='sem-data') return 'Sem data registrada';
  const [y,m] = key.split('-');
  return `${MONTH_NAMES[parseInt(m,10)-1]} de ${y}`;
}

function buildMonthlyData(){
  const num = v => (v==="" || v===null || v===undefined || isNaN(v)) ? 0 : Number(v);
  const months = {}; // key -> { purchCount, purchTotal, saleCount, saleTotal, profitTotal }

  function ensure(key){
    if(!months[key]) months[key] = {purchCount:0, purchTotal:0, saleCount:0, saleTotal:0, profitTotal:0};
    return months[key];
  }

  state.items.forEach(i=>{
    const pKey = i.purchaseDate ? i.purchaseDate.slice(0,7) : 'sem-data';
    const m1 = ensure(pKey);
    m1.purchCount += 1;
    m1.purchTotal += num(i.purchasePrice);

    if(i.status==='Vendido' && i.realSale!==""){
      const sKey = i.saleDate ? i.saleDate.slice(0,7) : 'sem-data';
      const m2 = ensure(sKey);
      m2.saleCount += 1;
      m2.saleTotal += num(i.realSale);
      m2.profitTotal += (num(i.realSale) - num(i.purchasePrice));
    }
  });

  const keys = Object.keys(months).filter(k=>k!=='sem-data').sort().reverse();
  if(months['sem-data']) keys.push('sem-data');
  return {months, keys};
}

function renderMonthly(container){
  const section = document.createElement('div');
  section.className='section';
  section.style.paddingTop='4px';

  const {months, keys} = buildMonthlyData();

  if(keys.length===0){
    section.innerHTML = `<div class="empty">Sem dados suficientes ainda. Cadastre data de compra e de venda nos relógios para ver a análise mensal.</div>`;
    container.appendChild(section);
    return;
  }

  const intro = document.createElement('div');
  intro.className='section-title';
  intro.style.marginTop='4px';
  intro.textContent = 'Compras e vendas por mês';
  section.appendChild(intro);

  keys.forEach(key=>{
    const m = months[key];
    const card = document.createElement('div');
    card.style.background='var(--surface)';
    card.style.border='1px solid var(--border)';
    card.style.borderRadius='16px';
    card.style.padding='16px';
    card.style.marginBottom='12px';

    const profitColor = m.profitTotal > 0 ? 'var(--ok)' : (m.profitTotal < 0 ? 'var(--sold)' : 'var(--muted)');

    card.innerHTML = `
      <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--gold-bright);margin-bottom:12px;text-transform:capitalize;">${monthLabel(key)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Compras (${m.purchCount})</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;">${fmtBRL(m.purchTotal)}</div>
        </div>
        <div>
          <div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Vendas (${m.saleCount})</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;">${fmtBRL(m.saleTotal)}</div>
        </div>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:11.5px;color:var(--muted);">Lucro do mês</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:${profitColor};">${fmtBRL(m.profitTotal)}</span>
      </div>
    `;
    section.appendChild(card);
  });

  container.appendChild(section);
}

function openModal(item){
  state.editingItem = item ? {...item} : {
    id:cid(), owner:'Léo', model:'', color:'', condition:'Novo', purchaseDate:'',
    purchasePrice:'', expectedSale:'', status:'Disponível', saleDate:'', realSale:''
  };
  state.modalOpen = true;
  render();
}
function closeModal(){
  state.modalOpen = false;
  state.editingItem = null;
  render();
}

function renderModal(){
  const it = state.editingItem;
  const isEdit = state.items.some(i=>i.id===it.id);
  const backdrop = document.createElement('div');
  backdrop.className='modal-backdrop';
  backdrop.onclick = (e)=>{ if(e.target===backdrop) closeModal(); };

  const modal = document.createElement('div');
  modal.className='modal';
  modal.innerHTML = `
    <h3>${isEdit?'Editar relógio':'Adicionar relógio'}</h3>
    <div class="field-row">
      <div class="field"><label>Dono</label>
        <select id="f_owner">
          ${['Léo','Alemão','Outro'].map(o=>`<option value="${o}" ${it.owner===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Estado</label>
        <select id="f_condition">
          ${['Novo','Usado'].map(o=>`<option value="${o}" ${it.condition===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>Modelo</label><input id="f_model" value="${it.model||''}" placeholder="Ex: Citizen Tsuyosa 40mm" /></div>
    <div class="field"><label>Cor</label><input id="f_color" value="${it.color||''}" placeholder="Ex: Azul Escuro" /></div>
    <div class="field-row">
      <div class="field"><label>Data de compra</label><input type="date" id="f_pdate" value="${it.purchaseDate||''}" /></div>
      <div class="field"><label>Valor pago (R$)</label><input type="number" id="f_pprice" value="${it.purchasePrice}" placeholder="0,00" /></div>
    </div>
    <div class="field"><label>Valor de venda previsto (R$)</label><input type="number" id="f_esale" value="${it.expectedSale}" placeholder="0,00" /></div>
    <div class="field"><label>Status</label>
      <select id="f_status">
        ${['Disponível','Reservado','Vendido'].map(o=>`<option value="${o}" ${it.status===o?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>
    <div id="soldFields" style="display:${it.status==='Vendido'?'block':'none'}">
      <div class="field-row">
        <div class="field"><label>Data da venda</label><input type="date" id="f_sdate" value="${it.saleDate||''}" /></div>
        <div class="field"><label>Valor real (R$)</label><input type="number" id="f_rsale" value="${it.realSale}" placeholder="0,00" /></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
      <button class="btn btn-gold" id="saveBtn">Salvar</button>
    </div>
    ${isEdit?'<button class="danger-link" id="delBtn">Remover relógio</button>':''}
  `;
  backdrop.appendChild(modal);
  root.appendChild(backdrop);

  document.getElementById('f_status').addEventListener('change', e=>{
    document.getElementById('soldFields').style.display = e.target.value==='Vendido' ? 'block':'none';
  });
  document.getElementById('cancelBtn').onclick = closeModal;
  if(isEdit) document.getElementById('delBtn').onclick = async ()=>{
    if(confirm('Remover este relógio do estoque?')){
      state.items = state.items.filter(i=>i.id!==it.id);
      await saveItems();
      closeModal();
      showToast('Relógio removido.');
    }
  };
  document.getElementById('saveBtn').onclick = async ()=>{
    const model = document.getElementById('f_model').value.trim();
    if(!model){ showToast('Informe o modelo do relógio.'); return; }
    const updated = {
      id: it.id,
      owner: document.getElementById('f_owner').value,
      condition: document.getElementById('f_condition').value,
      model,
      color: document.getElementById('f_color').value.trim(),
      purchaseDate: document.getElementById('f_pdate').value,
      purchasePrice: document.getElementById('f_pprice').value,
      expectedSale: document.getElementById('f_esale').value,
      status: document.getElementById('f_status').value,
      saleDate: document.getElementById('f_sdate') ? document.getElementById('f_sdate').value : it.saleDate,
      realSale: document.getElementById('f_rsale') ? document.getElementById('f_rsale').value : it.realSale,
    };
    if(isEdit){
      state.items = state.items.map(i=>i.id===it.id?updated:i);
    } else {
      state.items.push(updated);
    }
    await saveItems();
    closeModal();
    showToast('Salvo com sucesso.');
  };
}

init();

</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
